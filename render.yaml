services:
  - type: web
    name: ai-weather-map
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: AI_WEATHER_WEATHER_API_KEY
        sync: false
